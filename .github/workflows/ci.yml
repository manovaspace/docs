name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress
            --base-url https://manovaspace.github.io/docs
            --exclude '^https://github\.com/'
            --exclude '^https://www\.npmjs\.com/'
            './dist/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
